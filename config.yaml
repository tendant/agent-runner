# Claude Code API Wrapper Configuration

# Directory paths
projects_root: ./projects
runs_root: ./runs
tmp_root: ./tmp

# Project allowlist (empty means all projects allowed)
allowed_projects: []
  # - site-a
  # - site-b

# Execution limits
max_runtime_seconds: 300
max_concurrent_jobs: 5

# Git settings
git_push_retries: 3
git_push_retry_delay_seconds: 5

# Validation settings
validation:
  block_binary_files: false
  blocked_paths:
    - ".git/"
    - ".github/"
    - ".gitlab-ci.yml"
    - "secrets/"
    - "*.env"

# API settings
api:
  bind: "127.0.0.1:8080"
  api_key: ""  # Optional; if set, required in X-API-Key header

# Agent mode settings
agent:
  max_iterations: 50
  max_total_seconds: 3600
  max_iteration_seconds: 300

# Cleanup
job_retention_seconds: 3600
startup_cleanup_stale_jobs: true
